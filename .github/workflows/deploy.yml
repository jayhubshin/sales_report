name: Deploy EPC Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase secrets
        run: |
          sed -i "s|__SB_URL__|${{ secrets.SB_URL }}|g"       index.html
          sed -i "s|__SB_KEY__|${{ secrets.SB_KEY }}|g"       index.html
          sed -i "s|__SB_BUCKET__|${{ secrets.SB_BUCKET }}|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
