<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EPC 통합 실적 분석 시스템 V6</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{
  --primary:#2563eb;--success:#16a34a;--warning:#d97706;
  --danger:#dc2626;--purple:#7c3aed;--bg:#f1f5f9;
  --card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

/* 상단바 */
.top-bar{background:var(--primary);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.top-bar h1{font-size:16px;font-weight:700;flex:1;}
.top-bar button{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;}
.top-bar button:hover{background:rgba(255,255,255,.35);}
.sb-status{font-size:12px;opacity:.85;}

/* 업로드 */
.upload-section{padding:14px 20px;background:#fff;border-bottom:1px solid var(--border);display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end;}
.upload-group{display:flex;flex-direction:column;gap:4px;}
.upload-group label{font-size:11px;color:var(--muted);font-weight:600;}
.upload-group input[type=file]{font-size:12px;}
.file-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin-top:3px;}
.tag-ok{background:#dcfce7;color:var(--success);}
.tag-ing{background:#fef9c3;color:var(--warning);}
.tag-fail{background:#fee2e2;color:var(--danger);}

/* 컨트롤 */
.ctrl-bar{padding:10px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid var(--border);}
.mode-tabs{display:flex;gap:4px;}
.mode-tabs button{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:12px;}
.mode-tabs button.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.ctrl-bar input[type=date]{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;}

/* KPI */
.kpi-row{display:flex;gap:12px;padding:16px 20px;flex-wrap:wrap;}
.kpi-card{background:#fff;border-radius:10px;padding:14px 18px;flex:1;min-width:140px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.kpi-label{font-size:11px;color:var(--muted);margin-bottom:4px;}
.kpi-val{font-size:26px;font-weight:700;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.kpi-delta{font-size:12px;margin-top:4px;}
.delta-up{color:var(--success);}
.delta-dn{color:var(--danger);}

/* 탭 */
.tab-bar{display:flex;padding:0 20px;border-bottom:2px solid var(--border);background:#fff;}
.tab-bar button{padding:10px 18px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab-bar button.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;}
.tab-content{display:none;padding:20px;}
.tab-content.active{display:block;}

/* 요약표 */
.summary-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px 0;}
.capture-btn{padding:8px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
.capture-btn:hover{background:#1d4ed8;}
.summary-table-wrap{overflow-x:auto;width:100%;}
.summary-tbl{border-collapse:collapse;width:max-content;margin:0 auto;font-size:15px;}
.summary-tbl th,.summary-tbl td{border:1px solid #cbd5e1;padding:9px 14px;text-align:center;white-space:nowrap;}
.summary-tbl thead th{font-weight:700;}
.th-site{background:#dbeafe;color:#1e40af;}
.th-ins{background:#dcfce7;color:#166534;}
.th-doc{background:#fef9c3;color:#854d0e;}
.th-qty{background:#fce7f3;color:#9d174d;}
.th-route{background:#ede9fe;color:#5b21b6;}
.summary-tbl tbody tr:hover{background:#f8fafc;}
.total-row{background:#f1f5f9;font-weight:700;}
.total-row td{border-top:2px solid #94a3b8;}

/* 차트 */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}
.chart-card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.chart-card h3{font-size:13px;color:var(--muted);margin-bottom:12px;}
canvas{max-height:260px;}

@media(max-width:700px){
  .chart-grid{grid-template-columns:1fr;}
  .kpi-card{min-width:120px;}
}
</style>
</head>
<body>

<!-- 상단바 -->
<div class="top-bar">
  <h1>⚡ EPC 통합 실적 분석 시스템 V6</h1>
  <span class="sb-status" id="sbStatus">☁️ 연결 확인 중...</span>
  <button onclick="loadFromSupabase()">☁️ 불러오기</button>
</div>

<!-- 파일 업로드 -->
<div class="upload-section">
  <div class="upload-group">
    <label>📁 현장목록</label>
    <input type="file" accept=".xlsx,.xls" onchange="handleFile('site',this)">
    <span class="file-tag" id="tag-site">미업로드</span>
  </div>
  <div class="upload-group">
    <label>📁 실사목록</label>
    <input type="file" accept=".xlsx,.xls" onchange="handleFile('ins',this)">
    <span class="file-tag" id="tag-ins">미업로드</span>
  </div>
  <div class="upload-group">
    <label>📁 서류목록</label>
    <input type="file" accept=".xlsx,.xls" onchange="handleFile('doc',this)">
    <span class="file-tag" id="tag-doc">미업로드</span>
  </div>
</div>

<!-- 모드 & 날짜 -->
<div class="ctrl-bar">
  <div class="mode-tabs">
    <button class="active" onclick="setMode('week',this)">주간</button>
    <button onclick="setMode('month',this)">월간</button>
    <button onclick="setMode('quarter',this)">분기</button>
    <button onclick="setMode('year',this)">연간</button>
  </div>
  <input type="date" id="refDate" onchange="renderAll()">
</div>

<!-- KPI -->
<div class="kpi-row">
  <div class="kpi-card">
    <div class="kpi-label" id="lbl-site">금주 현장등록</div>
    <div class="kpi-val"   id="val-site">0</div>
    <div class="kpi-delta" id="dlt-site"></div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label" id="lbl-ins">금주 현장실사</div>
    <div class="kpi-val"   id="val-ins">0</div>
    <div class="kpi-delta" id="dlt-ins"></div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label" id="lbl-doc">금주 계약완료(건)</div>
    <div class="kpi-val"   id="val-doc">0</div>
    <div class="kpi-delta" id="dlt-doc"></div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label" id="lbl-qty">금주 계약수량(기)</div>
    <div class="kpi-val"   id="val-qty">0</div>
    <div class="kpi-delta" id="dlt-qty"></div>
  </div>
</div>

<!-- 탭 -->
<div class="tab-bar">
  <button class="active" onclick="showTab('summary',this)">실적 요약</button>
  <button onclick="showTab('site',this)">현장 현황</button>
  <button onclick="showTab('contract',this)">계약 현황</button>
</div>

<!-- 실적 요약 탭 -->
<div class="tab-content active" id="tab-summary">
  <div class="summary-wrap">
    <button class="capture-btn" onclick="captureTable()">📷 요약표 캡처</button>
    <div class="summary-table-wrap">
      <table class="summary-tbl" id="summaryTbl">
        <thead id="summaryHead"></thead>
        <tbody id="summaryBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 현장 현황 탭 -->
<div class="tab-content" id="tab-site">
  <div class="chart-grid">
    <div class="chart-card">
      <h3 id="chartSiteLabel">현장등록 추이</h3>
      <canvas id="chartSite"></canvas>
    </div>
    <div class="chart-card">
      <h3 id="chartInsLabel">현장실사 추이</h3>
      <canvas id="chartIns"></canvas>
    </div>
  </div>
</div>

<!-- 계약 현황 탭 -->
<div class="tab-content" id="tab-contract">
  <div class="chart-grid">
    <div class="chart-card">
      <h3>인입경로별 계약수량(기) — 누적</h3>
      <canvas id="chartRoute"></canvas>
    </div>
    <div class="chart-card">
      <h3 id="chartDocLabel">계약완료 추이</h3>
      <canvas id="chartDoc"></canvas>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// ① Supabase 설정 — GitHub Actions가 빌드 시 자동 치환
//    소스코드에는 플레이스홀더만 존재, 실제 값은 노출 안 됨
// ═══════════════════════════════════════════════════════════
const SB_URL    = '__SB_URL__';
const SB_KEY    = '__SB_KEY__';
const SB_BUCKET = '__SB_BUCKET__';

// ═══════════════════════════════════════════════════════════
// ② 상수
// ═══════════════════════════════════════════════════════════
const FILE_NAME_MAP = { site:'site.xlsx', ins:'ins.xlsx', doc:'doc.xlsx' };

const VENDORS = [
  '에버온','네이비인프라','나노이엔엠','왕산전기','디피솔루션',
  '나이스테크','디피시스','화두에너지솔루션','신천전설',
  '이브이세상','주식회사 볼텍','대광이브이','153대한전기'
];

const ROUTE_KEYS = ['신규','추가','자사','타사','투자'];
const ROUTE_MAP  = {
  '신규계약':'신규','추가계약':'추가',
  '자사교체':'자사','타사교체':'타사','투자설치':'투자'
};
const ROUTE_COLORS = {
  '신규':'#16a34a','추가':'#d97706',
  '자사':'#2563eb','타사':'#dc2626','투자':'#7c3aed'
};
const MODE_LABEL = {
  week:    {cur:'금주',  pre:'전주'  },
  month:   {cur:'금월',  pre:'전월'  },
  quarter: {cur:'금분기',pre:'전분기'},
  year:    {cur:'금년',  pre:'전년'  }
};

// ═══════════════════════════════════════════════════════════
// ③ 상태
// ═══════════════════════════════════════════════════════════
let MODE = 'week';
const STORE = { site:[], ins:[], doc:[] };
let charts  = {};

// ═══════════════════════════════════════════════════════════
// ④ 초기화
// ═══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('refDate').value = new Date().toISOString().slice(0,10);
  initSupabase();
});

async function initSupabase(){
  if(SB_URL.startsWith('__')){
    setStatus('⚠️ Supabase 미설정 (로컬 모드)');
    return;
  }
  setStatus('🔄 연결 확인 중...');
  try{
    const r = await fetch(
      `${SB_URL}/storage/v1/bucket/${SB_BUCKET}`,
      { headers: buildSbHeaders() }
    );
    if(r.ok){ setStatus('✅ Supabase 연결됨'); await loadFromSupabase(); }
    else     { setStatus(`⚠️ 버킷 오류 (${r.status})`); }
  }catch(e){ setStatus('⚠️ 네트워크 오류'); }
}

// Supabase 요청 헤더 (service_role 키 사용)
function buildSbHeaders(extra={}){
  return {
    'Authorization': `Bearer ${SB_KEY}`,
    'apikey'       : SB_KEY,
    ...extra
  };
}

function setStatus(msg){ document.getElementById('sbStatus').textContent = msg; }

// ═══════════════════════════════════════════════════════════
// ⑤ 파일 처리
// ═══════════════════════════════════════════════════════════
async function handleFile(key, input){
  const file = input.files[0];
  if(!file) return;
  setTag(key,'ing',`📂 ${file.name} 로딩 중...`);
  try{
    const buf = await file.arrayBuffer();
    parseExcel(key, buf);
    setTag(key,'ok',`✅ ${file.name}`);
    if(!SB_URL.startsWith('__')) await saveToSupabase(key, buf);
    renderAll();
  }catch(e){ setTag(key,'fail',`❌ ${e.message}`); }
}

function setTag(key, type, msg){
  const el = document.getElementById(`tag-${key}`);
  el.className = `file-tag tag-${type}`;
  el.textContent = msg;
}

function parseExcel(key, buf){
  const wb = XLSX.read(buf,{type:'array',cellDates:true});
  const ws = wb.Sheets[wb.SheetNames[0]];
  STORE[key] = XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:'yyyy-mm-dd'});
}

// ═══════════════════════════════════════════════════════════
// ⑥ Supabase 저장 / 불러오기
// ═══════════════════════════════════════════════════════════
async function saveToSupabase(key, buf){
  const fileName = FILE_NAME_MAP[key];
  const url = `${SB_URL}/storage/v1/object/${SB_BUCKET}/${fileName}`;
  setStatus(`🔄 ${fileName} 저장 중...`);
  try{
    const r = await fetch(url,{
      method : 'POST',
      headers: buildSbHeaders({'Content-Type':'application/octet-stream','x-upsert':'true'}),
      body   : buf
    });
    if(r.ok) setStatus(`✅ ${fileName} 저장 완료 (${new Date().toLocaleTimeString('ko-KR')})`);
    else     setStatus(`❌ 저장 실패 HTTP ${r.status}`);
  }catch(e){ setStatus(`❌ 저장 오류: ${e.message}`); }
}

async function loadFromSupabase(){
  if(SB_URL.startsWith('__')){ setStatus('⚠️ Supabase 미설정'); return; }
  setStatus('🔄 데이터 불러오는 중...');
  let loaded = 0;
  for(const [key, fileName] of Object.entries(FILE_NAME_MAP)){
    try{
      const url = `${SB_URL}/storage/v1/object/${SB_BUCKET}/${fileName}`;
      const r   = await fetch(url, { headers: buildSbHeaders() });
      if(r.ok){
        const buf = await r.arrayBuffer();
        parseExcel(key, buf);
        setTag(key,'ok',`✅ ${fileName} (클라우드)`);
        loaded++;
      }
    }catch(e){}
  }
  if(loaded > 0){
    setStatus(`✅ ${loaded}개 파일 불러옴 (${new Date().toLocaleTimeString('ko-KR')})`);
    renderAll();
  } else {
    setStatus('⚠️ 저장된 파일 없음');
  }
}

// ═══════════════════════════════════════════════════════════
// ⑦ 날짜 범위
// ═══════════════════════════════════════════════════════════
function getRanges(refStr, mode){
  const ref = new Date(refStr);
  const y   = ref.getFullYear();
  let curS,curE,preS,preE,accumS,accumE,accumLabel;

  if(mode==='week'){
    const dow = ref.getDay();
    const mon = new Date(ref); mon.setDate(ref.getDate()-(dow===0?6:dow-1));
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    curS=mon; curE=sun;
    const pm=new Date(mon); pm.setDate(mon.getDate()-7);
    const ps=new Date(pm);  ps.setDate(pm.getDate()+6);
    preS=pm; preE=ps;
    accumS=new Date(y,0,1); accumE=sun; accumLabel='누적';
  } else if(mode==='month'){
    curS=new Date(y,ref.getMonth(),1);
    curE=new Date(y,ref.getMonth()+1,0);
    preS=new Date(y,ref.getMonth()-1,1);
    preE=new Date(y,ref.getMonth(),0);
    accumS=new Date(y,0,1); accumE=curE; accumLabel='누적';
  } else if(mode==='quarter'){
    const q=Math.floor(ref.getMonth()/3);
    curS=new Date(y,q*3,1);
    curE=new Date(y,q*3+3,0);
    preS=new Date(y,(q-1)*3,1);
    preE=new Date(y,q*3,0);
    accumS=new Date(y,0,1); accumE=curE; accumLabel='누적';
  } else {
    curS=new Date(y,0,1);   curE=new Date(y,11,31);
    preS=new Date(y-1,0,1); preE=new Date(y-1,11,31);
    accumS=curS; accumE=curE; accumLabel=`전년(${y-1})`;
  }
  return {curS,curE,preS,preE,accumS,accumE,accumLabel};
}

function parseDate(v){
  if(!v) return null;
  const d=new Date(v);
  return isNaN(d)?null:d;
}
function inRange(d,s,e){ return d&&d>=s&&d<=e; }

// ═══════════════════════════════════════════════════════════
// ⑧ 인입경로 분류
// ═══════════════════════════════════════════════════════════
function classifyRoute(row){
  const colN=(row[13]||'').toString().trim();
  const colL=(row[11]||'').toString().trim();
  if(colN.includes('투자설치')) return '투자';
  for(const [full,short] of Object.entries(ROUTE_MAP)){
    if(colL.includes(full)) return short;
  }
  return null;
}

// ═══════════════════════════════════════════════════════════
// ⑨ 메인 렌더
// ═══════════════════════════════════════════════════════════
function renderAll(){
  const refStr = document.getElementById('refDate').value;
  if(!refStr) return;
  const {curS,curE,preS,preE,accumS,accumE,accumLabel} = getRanges(refStr,MODE);
  const ml = MODE_LABEL[MODE];

  // 현장등록 집계 (site: col0=업체, col1=날짜)
  const siteCur={},sitePre={},siteAccum={};
  VENDORS.forEach(v=>{siteCur[v]=0;sitePre[v]=0;siteAccum[v]=0;});
  STORE.site.slice(1).forEach(row=>{
    const v=(row[0]||'').toString().trim();
    const d=parseDate(row[1]);
    if(!VENDORS.includes(v)) return;
    if(inRange(d,curS,curE))    siteCur[v]++;
    if(inRange(d,preS,preE))    sitePre[v]++;
    if(inRange(d,accumS,accumE))siteAccum[v]++;
  });

  // 현장실사 집계 (ins: col0=업체, col1=날짜)
  const insCur={},insPre={},insAccum={};
  VENDORS.forEach(v=>{insCur[v]=0;insPre[v]=0;insAccum[v]=0;});
  STORE.ins.slice(1).forEach(row=>{
    const v=(row[0]||'').toString().trim();
    const d=parseDate(row[1]);
    if(!VENDORS.includes(v)) return;
    if(inRange(d,curS,curE))    insCur[v]++;
    if(inRange(d,preS,preE))    insPre[v]++;
    if(inRange(d,accumS,accumE))insAccum[v]++;
  });

  // 계약 집계 (doc: col0=업체, col9=체결여부, col10=날짜, col11=L, col13=N, col14=O수량)
  const docCur={},docPre={},docAccum={};
  const qtyCur={},qtyPre={},qtyAccum={};
  const routeCur={},routeAccum={};
  VENDORS.forEach(v=>{
    docCur[v]=0;docPre[v]=0;docAccum[v]=0;
    qtyCur[v]=0;qtyPre[v]=0;qtyAccum[v]=0;
    routeCur[v]={};routeAccum[v]={};
    ROUTE_KEYS.forEach(k=>{routeCur[v][k]=0;routeAccum[v][k]=0;});
  });

  STORE.doc.slice(1).forEach(row=>{
    if(!(row[9]||'').toString().includes('체결')) return;
    const v  =(row[0]||'').toString().trim();
    if(!VENDORS.includes(v)) return;
    const d  = parseDate(row[10]);
    const qty= Math.round(parseFloat(row[14])||0);
    const rt = classifyRoute(row);

    if(inRange(d,curS,curE)){
      docCur[v]++; qtyCur[v]+=qty;
      if(rt) routeCur[v][rt]=(routeCur[v][rt]||0)+qty;
    }
    if(inRange(d,preS,preE)){
      docPre[v]++; qtyPre[v]+=qty;
    }
    if(inRange(d,accumS,accumE)){
      docAccum[v]++; qtyAccum[v]+=qty;
      if(rt) routeAccum[v][rt]=(routeAccum[v][rt]||0)+qty;
    }
  });

  // KPI 합계
  const tSC=sum(siteCur),tSP=sum(sitePre);
  const tIC=sum(insCur), tIP=sum(insPre);
  const tDC=sum(docCur), tDP=sum(docPre);
  const tQC=sum(qtyCur), tQP=sum(qtyPre);

  function setKpi(lblId,valId,dltId,label,val,pre){
    document.getElementById(lblId).textContent=`${ml.cur} ${label}`;
    document.getElementById(valId).textContent=val.toLocaleString();
    const diff=val-pre;
    const el=document.getElementById(dltId);
    el.className='kpi-delta '+(diff>=0?'delta-up':'delta-dn');
    el.textContent=`${ml.pre} 대비 ${diff>=0?'+':''}${diff}`;
  }
  setKpi('lbl-site','val-site','dlt-site','현장등록',tSC,tSP);
  setKpi('lbl-ins', 'val-ins', 'dlt-ins', '현장실사',tIC,tIP);
  setKpi('lbl-doc', 'val-doc', 'dlt-doc', '계약완료(건)',tDC,tDP);
  setKpi('lbl-qty', 'val-qty', 'dlt-qty', '계약수량(기)',tQC,tQP);

  renderSummaryTable({ml,accumLabel,siteCur,siteAccum,insCur,insAccum,
                      docCur,docAccum,qtyCur,qtyAccum,routeAccum});
  renderCharts({ml,siteCur,insCur,docCur,routeAccum});
}

function sum(obj){ return VENDORS.reduce((s,v)=>s+(obj[v]||0),0); }

// ═══════════════════════════════════════════════════════════
// ⑩ 요약표
// ═══════════════════════════════════════════════════════════
function renderSummaryTable(d){
  const ml=d.ml;
  document.getElementById('summaryHead').innerHTML=`
    <tr>
      <th rowspan="2" style="background:#f1f5f9;">업체</th>
      <th colspan="2" class="th-site">현장등록</th>
      <th colspan="2" class="th-ins">현장실사</th>
      <th colspan="2" class="th-doc">계약완료(건)</th>
      <th colspan="2" class="th-qty">계약수량(기)</th>
      <th colspan="${ROUTE_KEYS.length}" class="th-route">인입경로별 계약수량(기) — ${d.accumLabel}</th>
    </tr>
    <tr>
      <th class="th-site">${ml.cur}</th><th class="th-site">누적</th>
      <th class="th-ins">${ml.cur}</th> <th class="th-ins">누적</th>
      <th class="th-doc">${ml.cur}</th> <th class="th-doc">누적</th>
      <th class="th-qty">${ml.cur}</th> <th class="th-qty">누적</th>
      ${ROUTE_KEYS.map(k=>`<th class="th-route">${k}</th>`).join('')}
    </tr>`;

  const fmt=v=>v===0?'-':v.toLocaleString();

  function buildRow(label,isTotal,sc,sa,ic,ia,dc,da,qc,qa,ra){
    const cls=isTotal?'total-row':'';
    return `<tr class="${cls}">
      <td style="text-align:left;font-weight:${isTotal?700:400}">${label}</td>
      <td>${fmt(sc)}</td><td>${fmt(sa)}</td>
      <td>${fmt(ic)}</td><td>${fmt(ia)}</td>
      <td>${fmt(dc)}</td><td>${fmt(da)}</td>
      <td>${fmt(qc)}</td><td>${fmt(qa)}</td>
      ${ROUTE_KEYS.map(k=>`<td>${fmt((ra||{})[k]||0)}</td>`).join('')}
    </tr>`;
  }

  // 합계 계산
  const tSC=sum(d.siteCur),  tSA=sum(d.siteAccum);
  const tIC=sum(d.insCur),   tIA=sum(d.insAccum);
  const tDC=sum(d.docCur),   tDA=sum(d.docAccum);
  const tQC=sum(d.qtyCur),   tQA=sum(d.qtyAccum);
  const tRA={};
  ROUTE_KEYS.forEach(k=>{
    tRA[k]=VENDORS.reduce((s,v)=>s+((d.routeAccum[v]||{})[k]||0),0);
  });

  let rows=buildRow('합계',true,tSC,tSA,tIC,tIA,tDC,tDA,tQC,tQA,tRA);
  VENDORS.forEach(v=>{
    rows+=buildRow(v,false,
      d.siteCur[v]||0,  d.siteAccum[v]||0,
      d.insCur[v]||0,   d.insAccum[v]||0,
      d.docCur[v]||0,   d.docAccum[v]||0,
      d.qtyCur[v]||0,   d.qtyAccum[v]||0,
      d.routeAccum[v]||{}
    );
  });
  document.getElementById('summaryBody').innerHTML=rows;
}

// ═══════════════════════════════════════════════════════════
// ⑪ 차트
// ═══════════════════════════════════════════════════════════
function renderCharts(d){
  const labels=VENDORS.map(v=>v.length>4?v.slice(0,4)+'…':v);
  const ml=d.ml;

  function mkBar(id,label,data,color){
    if(charts[id]) charts[id].destroy();
    charts[id]=new Chart(document.getElementById(id),{
      type:'bar',
      data:{labels,datasets:[{label,data,backgroundColor:color+'99',borderColor:color,borderWidth:1}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
    });
  }

  document.getElementById('chartSiteLabel').textContent=`${ml.cur} 현장등록 (업체별)`;
  document.getElementById('chartInsLabel').textContent =`${ml.cur} 현장실사 (업체별)`;
  document.getElementById('chartDocLabel').textContent =`${ml.cur} 계약완료 (업체별)`;

  mkBar('chartSite','현장등록',VENDORS.map(v=>d.siteCur[v]||0),'#2563eb');
  mkBar('chartIns', '현장실사',VENDORS.map(v=>d.insCur[v]||0), '#16a34a');
  mkBar('chartDoc', '계약완료',VENDORS.map(v=>d.docCur[v]||0), '#d97706');

  // 인입경로 도넛
  if(charts['chartRoute']) charts['chartRoute'].destroy();
  const routeTotals=ROUTE_KEYS.map(k=>
    VENDORS.reduce((s,v)=>s+((d.routeAccum[v]||{})[k]||0),0)
  );
  charts['chartRoute']=new Chart(document.getElementById('chartRoute'),{
    type:'doughnut',
    data:{
      labels:ROUTE_KEYS,
      datasets:[{data:routeTotals,backgroundColor:ROUTE_KEYS.map(k=>ROUTE_COLORS[k]+'cc')}]
    },
    options:{responsive:true,plugins:{legend:{position:'bottom'}}}
  });
}

// ═══════════════════════════════════════════════════════════
// ⑫ 캡처
// ═══════════════════════════════════════════════════════════
async function captureTable(){
  const el=document.getElementById('summaryTbl');
  const canvas=await html2canvas(el,{scale:3,backgroundColor:'#fff'});
  const a=document.createElement('a');
  const ts=new Date().toISOString().slice(0,16).replace(/[-:T]/g,'');
  a.download=`EPC_실적요약_${ts}.png`;
  a.href=canvas.toDataURL('image/png');
  a.click();
}

// ═══════════════════════════════════════════════════════════
// ⑬ UI 헬퍼
// ═══════════════════════════════════════════════════════════
function setMode(mode,btn){
  MODE=mode;
  document.querySelectorAll('.mode-tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
function showTab(name,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-bar button').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  btn.classList.add('active');
}
</script>
