<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPC 주간 실적 통합 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root { --bg: #f4f7fa; --primary: #2563eb; --border: #e2e8f0; --text: #1e293b; --success: #16a34a; --white: #ffffff; }
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Pretendard', sans-serif; }
body { background: var(--bg); color: var(--text); }

/* 상단바 & 탭 */
.hd { background: var(--white); padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.hd h1 { font-size: 20px; color: var(--primary); font-weight: 800; }
.tab-bar { background: var(--white); padding: 0 25px; border-bottom: 1px solid var(--border); display: flex; gap: 20px; }
.tab { padding: 15px 5px; cursor: pointer; font-size: 14px; font-weight: 600; color: #64748b; border-bottom: 3px solid transparent; }
.tab.on { color: var(--primary); border-bottom-color: var(--primary); }

/* 필터 및 업로드 */
.pb { background: var(--white); padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.range-display { font-size: 14px; font-weight: 800; color: var(--primary); background: #eff6ff; padding: 8px 16px; border-radius: 8px; border: 1px solid #dbeafe; }
.ua { padding: 15px 25px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; gap: 15px; }
.upload-btn { border: 2px dashed #cbd5e1; border-radius: 10px; padding: 15px; flex: 1; text-align: center; cursor: pointer; font-weight: 700; background: #fafafa; }
.file-list { flex: 2; display: flex; gap: 10px; flex-wrap: wrap; }
.file-tag { font-size: 11px; padding: 8px 12px; background: #f1f5f9; border-radius: 6px; border: 1px solid var(--border); }

/* 메인 컨텐츠 */
.mn { padding: 25px; max-width: 1400px; margin: 0 auto; display: none; }
.mn.on { display: block; }
.g-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 25px; }
.cd { background: var(--white); padding: 20px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
.cd h3 { font-size: 15px; margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 10px; }

/* 테이블 스타일 */
.tbl { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
.tbl th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid var(--border); }
.tbl td { padding: 12px; border-bottom: 1px solid var(--border); }
.up { color: #ef4444; font-weight: 800; }
.down { color: #3b82f6; font-weight: 800; }

.chart-h { height: 300px; width: 100%; }
</style>
</head>
<body>

<div class="hd">
    <h1>📊 EPC 통합 실적 대시보드</h1>
    <div id="clock" style="font-size: 12px; color: #94a3b8;"></div>
</div>

<div class="tab-bar">
    <div class="tab on" onclick="chTab(0, this)">종합현황</div>
    <div class="tab" onclick="chTab(1, this)">현장현황(신규)</div>
</div>

<div class="ua">
    <div class="upload-btn" onclick="$('fInput').click()">📁 폴더 선택 (현장/실사/서류)</div>
    <input type="file" id="fInput" webkitdirectory directory multiple style="display:none" onchange="loadFiles(this.files)">
    <div class="file-list" id="tagBox"></div>
</div>

<div class="pb">
    <div class="range-display" id="dateRange">기간 계산 중...</div>
    <input type="date" id="baseDate" style="padding:6px; border:1px solid var(--border); border-radius:8px;" onchange="renderAll()">
</div>

<div id="mn-0" class="mn on">
    <div class="g-row">
        <div class="cd">
            <h3>금주 주요 지표</h3>
            <div style="display:flex; justify-content: space-around; padding: 20px 0;">
                <div style="text-align:center"><h3>신규현장</h3><div id="sum-site" style="font-size:30px; font-weight:800">0</div></div>
                <div style="text-align:center"><h3>실사완료</h3><div id="sum-ins" style="font-size:30px; font-weight:800">0</div></div>
                <div style="text-align:center"><h3>서류접수</h3><div id="sum-doc" style="font-size:30px; font-weight:800">0</div></div>
            </div>
        </div>
        <div class="cd">
            <h3>데이터별 비중</h3>
            <div class="chart-h"><canvas id="pieTotal"></canvas></div>
        </div>
    </div>
</div>

<div id="mn-1" class="mn">
    <div class="g-row">
        <div class="cd">
            <h3>업체별 신규 현장등록 (금주)</h3>
            <div class="chart-h"><canvas id="barVendor"></canvas></div>
        </div>
        <div class="cd">
            <h3>인입경로별 현황</h3>
            <div class="chart-h"><canvas id="piePath"></canvas></div>
        </div>
    </div>
    <div class="cd">
        <h3>업체별 전주 대비 증감 분석</h3>
        <table class="tbl" id="siteTable">
            <thead>
                <tr>
                    <th>업체명(B)</th>
                    <th>지난주 실적</th>
                    <th>이번주 실적</th>
                    <th>증감</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let DATA = { site: [], ins: [], doc: [] };
let charts = {};
const $ = id => document.getElementById(id);

// 초기화: 오늘 기준
$('baseDate').value = new Date().toISOString().slice(0, 10);

function chTab(i, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.mn').forEach(m => m.classList.remove('on'));
    el.classList.add('on');
    $(`mn-${i}`).classList.add('on');
    renderAll();
}

/* 날짜 파싱: YYYY-MM-DD 텍스트 및 엑셀 숫자 대응 */
function parseD(v) {
    if(!v) return null;
    if(v instanceof Date) return v;
    if(typeof v === 'number') return new Date((v - 25569) * 86400000);
    // YYYY-MM-DD 또는 YYYY.MM.DD 대응
    const s = String(v).replace(/\./g, '-');
    const d = new Date(s);
    return isNaN(d) ? null : d;
}

/* 금-목 주간 범위 계산 (전주/금주) */
function getWeeks() {
    const base = new Date($('baseDate').value);
    const day = base.getDay(); // 0(일)~6(토)
    
    // 이번 주 금요일 찾기 (가까운 과거의 금요일)
    let diff = day >= 5 ? day - 5 : day + 2;
    let thisFri = new Date(base);
    thisFri.setDate(base.getDate() - diff);
    
    // 금주(완성된 보고주): 지난주 금요일 ~ 어제 목요일
    let curS = new Date(thisFri); curS.setDate(thisFri.getDate() - 7);
    let curE = new Date(curS); curE.setDate(curS.getDate() + 6);
    
    // 전주: 지지난주 금요일 ~ 지난주 목요일
    let preS = new Date(curS); preS.setDate(curS.getDate() - 7);
    let preE = new Date(preS); preE.setDate(preS.getDate() + 6);
    
    curS.setHours(0,0,0,0); curE.setHours(23,59,59,999);
    preS.setHours(0,0,0,0); preE.setHours(23,59,59,999);

    $('dateRange').textContent = `${curS.toISOString().slice(0,10)} ~ ${curE.toISOString().slice(0,10)}`;
    return { cur: {s: curS, e: curE}, pre: {s: preS, e: preE} };
}

async function loadFiles(files) {
    const map = { '현장목록': 'site', '실사목록': 'ins', '서류목록': 'doc' };
    const latest = {};
    Array.from(files).forEach(f => {
        Object.keys(map).forEach(k => {
            if (f.name.includes(k)) {
                if (!latest[k] || f.lastModified > latest[k].lastModified) latest[k] = f;
            }
        });
    });

    $('tagBox').innerHTML = '';
    for (const k in latest) {
        const tag = document.createElement('div');
        tag.className = 'file-tag';
        tag.innerHTML = `<b>✅ ${k}</b>`;
        $('tagBox').appendChild(tag);
        await readExcel(latest[k], map[k]);
    }
    renderAll();
}

function readExcel(file, key) {
    return new Promise(res => {
        const reader = new FileReader();
        reader.onload = e => {
            const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
            DATA[key] = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            res();
        };
        reader.readAsArrayBuffer(file);
    });
}

function renderAll() {
    const W = getWeeks();
    
    // --- 현장 데이터 분석 (site) ---
    // B(1): 업체명, F(5): 인입경로, I(8): 등록일
    let curV = {}, preV = {}, paths = {};
    let totalCur = 0;

    if (DATA.site.length > 3) {
        DATA.site.slice(3).forEach(row => {
            const d = parseD(row[8]);
            const v = row[1] || '미지정';
            const p = row[5] || '기타';

            if (d >= W.cur.s && d <= W.cur.e) {
                curV[v] = (curV[v] || 0) + 1;
                paths[p] = (paths[p] || 0) + 1;
                totalCur++;
            } else if (d >= W.pre.s && d <= W.pre.e) {
                preV[v] = (preV[v] || 0) + 1;
            }
        });
    }

    $('sum-site').textContent = totalCur;

    // 테이블 업데이트
    const tbody = $('siteTable').querySelector('tbody');
    tbody.innerHTML = '';
    const allVendors = Array.from(new Set([...Object.keys(curV), ...Object.keys(preV)]));
    
    allVendors.sort((a,b) => (curV[b]||0) - (curV[a]||0)).forEach(v => {
        const c = curV[v] || 0;
        const p = preV[v] || 0;
        const diff = c - p;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${v}</td><td>${p}</td><td>${c}</td><td class="${diff >= 0 ? 'up' : 'down'}">${diff >= 0 ? '▲' : '▼'} ${Math.abs(diff)}</td>`;
        tbody.appendChild(tr);
    });

    // 그래프 업데이트
    drawBar('barVendor', Object.keys(curV), Object.values(curV), '신규 등록수');
    drawPie('piePath', Object.keys(paths), Object.values(paths));
}

function drawBar(id, labels, data, label) {
    if (charts[id]) charts[id].destroy();
    if (labels.length === 0) return;
    charts[id] = new Chart($(id), {
        type: 'bar',
        data: { labels: labels, datasets: [{ label: label, data: data, backgroundColor: '#2563eb', borderRadius: 5 }] },
        options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
    });
}

function drawPie(id, labels, data) {
    if (charts[id]) charts[id].destroy();
    if (labels.length === 0) return;
    charts[id] = new Chart($(id), {
        type: 'doughnut',
        data: { labels: labels, datasets: [{ data: data, backgroundColor: ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444'] }] },
        options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    });
}

setInterval(() => { $('clock').textContent = new Date().toLocaleString(); }, 1000);
</script>
</body>
</html>
